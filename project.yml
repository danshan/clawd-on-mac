name: ClawdOnMac
options:
  bundleIdPrefix: com.clawd
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: ClawdOnMac
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    COMBINE_HIDPI_IMAGES: YES

targets:
  ClawdOnMac:
    type: application
    platform: macOS
    sources:
      - path: Sources
        type: group
      - path: Resources/themes
        type: folder
        buildPhase: resources
      - path: Resources/sounds
        type: folder
        buildPhase: resources
      - path: Resources/en.lproj
        buildPhase: resources
      - path: Resources/ko.lproj
        buildPhase: resources
      - path: Resources/zh.lproj
        buildPhase: resources
      - path: Resources/icons
        type: folder
        buildPhase: resources
      - path: Resources/hooks
        type: folder
        buildPhase: resources
      - path: Resources/dashboard
        type: folder
        buildPhase: resources
    dependencies:
      - sdk: libsqlite3.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clawd.onmac
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/ClawdOnMac.entitlements
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
name: Release ClawdOnMac

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild -project ClawdOnMac.xcodeproj \
            -scheme ClawdOnMac \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package .app
        run: |
          APP_PATH=$(find build -name "ClawdOnMac.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: ClawdOnMac.app not found"
            exit 1
          fi
          ditto -c -k --keepParent "$APP_PATH" ClawdOnMac.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ClawdOnMac.zip
          generate_release_notes: true
